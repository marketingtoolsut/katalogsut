<!DOCTYPE html>

<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Katalog Produk</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

.slider{
display:flex;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.slide{
flex:0 0 100%;
scroll-snap-align:center;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
width:100%;
height:100%;
object-fit:contain;
}

.controls{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:15px;
background:rgba(0,0,0,0.5);
padding:10px 20px;
border-radius:20px;
transition:opacity 0.4s;
}

button{
background:white;
border:none;
padding:8px 12px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

#page{
color:white;
font-size:14px;
}

.dots{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#666;
}

.dot.active{
background:white;
}

#rotate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
display:none;
align-items:center;
justify-content:center;
font-size:22px;
z-index:9999;
text-align:center;
}

</style>

</head>

<body>

<div id="rotate">
Putar ponsel ke mode landscape
</div>

<div class="slider" id="slider">

<script>

for(let i=1;i<=28;i++){
document.write('<div class="slide"><img src="'+i+'.jpg"></div>');
}

</script>

</div>

<div class="dots" id="dots"></div>

<div class="controls" id="controls">

<button onclick="prev()">◀</button>

<span id="page">1 / 28</span>

<button onclick="next()">▶</button>

<button onclick="fullscreen()">⛶</button>

</div>

<script>

const slider=document.getElementById("slider");
const slides=document.querySelectorAll(".slide");
const page=document.getElementById("page");
const dots=document.getElementById("dots");
const controls=document.getElementById("controls");

let current=0;
let hideTimer;

for(let i=0;i<slides.length;i++){

let dot=document.createElement("div");
dot.className="dot";
dots.appendChild(dot);

}

function updatePage(){

page.textContent=(current+1)+" / "+slides.length;

document.querySelectorAll(".dot").forEach((d,i)=>{
d.classList.toggle("active",i===current);
});

}

function next(){

if(current<slides.length-1){

current++;

slider.scrollTo({
left:slider.clientWidth*current,
behavior:"smooth"
});

updatePage();

}

}

function prev(){

if(current>0){

current--;

slider.scrollTo({
left:slider.clientWidth*current,
behavior:"smooth"
});

updatePage();

}

}

slider.addEventListener("scroll",()=>{

current=Math.round(slider.scrollLeft/slider.clientWidth);

updatePage();

showControls();

});

function fullscreen(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

}

function showControls(){

controls.style.opacity="1";

clearTimeout(hideTimer);

hideTimer=setTimeout(()=>{

controls.style.opacity="0";

},2000);

}

document.body.addEventListener("tap",showControls);

updatePage();

function checkOrientation(){

if(window.innerHeight>window.innerWidth){

document.getElementById("rotate").style.display="flex";

}else{

document.getElementById("rotate").style.display="none";

}

}

window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);

</script>

</body>

</html>
