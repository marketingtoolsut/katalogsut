<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

<title>Katalog Produk</title>

<style>

body{
margin:0;
background:black;
overscroll-behavior:none;
touch-action: pan-x pan-y pinch-zoom;
font-family:Arial;
}

.slider{
display:flex;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.slide{
flex:0 0 100%;
scroll-snap-align:center;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
width:100%;
height:100%;
object-fit:contain;
transition: transform 0.3s ease; 
}

.controls{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:flex;
gap:10px;

background:rgba(0,0,0,0.6);
padding:8px 14px;
border-radius:20px;

opacity:0;
pointer-events:none;

transition:opacity 0.3s;

}

button{

background:white;
border:none;
padding:8px 12px;
border-radius:10px;
font-size:16px;
cursor:pointer;

}

#page{
color:white;
font-size:14px;
}

#rotate{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:black;

display:none;
align-items:center;
justify-content:center;

z-index:9999;

}

#rotate img{
max-width:80%;
max-height:80%;
object-fit:contain;
}
</style>

</head>

<body>


<div id="rotate">
<img src="putarponsel.jpg" alt="Rotate Phone">
</div>

<div class="slider" id="slider">

<script>

for(let i=1;i<=28;i++){
document.write('<div class="slide"><img src="'+i+'.jpg" loading="lazy"></div>');
}

</script>

</div>

<div class="controls" id="controls">

<button onclick="prev()">◀</button>

<span id="page">1 / 28</span>

<button onclick="next()">▶</button>

<button onclick="fullscreen()">⛶</button>

</div>

<script>

const slider=document.getElementById("slider");
const slides=document.querySelectorAll(".slide");
const page=document.getElementById("page");
const controls=document.getElementById("controls");

let current=0;
let hideTimer;

function updatePage(){

page.textContent=(current+1)+" / "+slides.length;

}

function next(){

if(current<slides.length-1){

current++;

slider.scrollTo({
left:slider.clientWidth*current,
behavior:"smooth"
});

updatePage();

}

}

function prev(){

if(current>0){

current--;

slider.scrollTo({
left:slider.clientWidth*current,
behavior:"smooth"
});

updatePage();

}

}

slider.addEventListener("scroll",()=>{

current=Math.round(slider.scrollLeft/slider.clientWidth);

updatePage();

showControls();

slides.forEach(slide => {
    let img = slide.querySelector('img');
    if(img) {
        img.style.transform = 'scale(1)';
        currentScale = 1;
    }
});

});

function fullscreen(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen().catch(err => {
    console.log("Fullscreen diblokir browser tanpa interaksi user.");
});

}else{

document.exitFullscreen();

}

}

function showControls(){

controls.style.opacity="1";
controls.style.pointerEvents="auto";

clearTimeout(hideTimer);

hideTimer=setTimeout(()=>{

controls.style.opacity="0";
controls.style.pointerEvents="none";

},1000);

}

document.addEventListener("touchstart",showControls);
document.addEventListener("mousemove",showControls);

updatePage();

// MODIFIKASI: Langsung Fullscreen saat Landscape
function checkOrientation(){

if(window.innerHeight > window.innerWidth){
    // Mode Portrait (Tegak)
    document.getElementById("rotate").style.display="flex";
} else {
    // Mode Landscape (Miring)
    document.getElementById("rotate").style.display="none";
    
    // Otomatis Fullscreen jika belum fullscreen
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen().catch(e => {});
    }
}

}

window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);


let initialDist = 0;
let currentScale = 1;

slider.addEventListener('touchstart', (e) => {
  if (document.fullscreenElement && e.touches.length === 2) {
    initialDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
});

slider.addEventListener('touchmove', (e) => {
  if (document.fullscreenElement && e.touches.length === 2) {
    e.preventDefault(); 
    let dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    currentScale = Math.max(1, Math.min(dist / initialDist, 4)); 
    
    let img = slides[current].querySelector('img');
    img.style.transition = 'none'; 
    img.style.transform = `scale(${currentScale})`;
  }
});

slider.addEventListener('touchend', (e) => {
  if (document.fullscreenElement && e.touches.length < 2) {
    let img = slides[current].querySelector('img');
    img.style.transition = 'transform 0.3s ease'; 
    
    if (currentScale < 1.1) {
      currentScale = 1;
      img.style.transform = `scale(1)`;
    }
  }
});

</script>

</body>

</html>
