<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Produk</title>

<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

.slider{
display:flex;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.slide{
flex:0 0 100%;
scroll-snap-align:center;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
width:100%;
height:100%;
object-fit:contain;
}

.zoom{
overflow:hidden;
touch-action:none;
}

.controls{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
background:rgba(0,0,0,0.6);
padding:8px 14px;
border-radius:20px;
opacity:0;
pointer-events:none;
transition:opacity 0.3s;
}

button{
background:white;
border:none;
padding:8px 12px;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

#page{
color:white;
font-size:14px;
}

#rotate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#rotate img{
max-width:80%;
max-height:80%;
object-fit:contain;
}

</style>

</head>

<body>

<div id="rotate">
<img src="rotatephone.png">
</div>

<div class="slider" id="slider"></div>

<div class="controls" id="controls">

<button onclick="prev()">◀</button> <span id="page">1 / 28</span> <button onclick="next()">▶</button> <button onclick="fullscreen()">⛶</button>

</div>

<script>

const slider = document.getElementById("slider");
const page = document.getElementById("page");
const controls = document.getElementById("controls");

let current = 0;
let hideTimer;
const totalPages = 28;

function createSlides(){

for(let i=1;i<=totalPages;i++){

const slide=document.createElement("div");
slide.className="slide";

const zoom=document.createElement("div");
zoom.className="zoom";

const img=document.createElement("img");
img.src=i+".jpg";
img.loading="lazy";

zoom.appendChild(img);
slide.appendChild(zoom);
slider.appendChild(slide);

}

}

createSlides();

const slides=document.querySelectorAll(".slide");

function initZoom(){

document.querySelectorAll(".zoom").forEach(el=>{
Panzoom(el,{
maxScale:4,
contain:"outside"
});
});

}

initZoom();

function updatePage(){
page.textContent=(current+1)+" / "+slides.length;
}

function next(){

if(current<slides.length-1){

current++;

slider.scrollTo({
left:slider.clientWidth*current,
behavior:"smooth"
});

updatePage();

}

}

function prev(){

if(current>0){

current--;

slider.scrollTo({
left:slider.clientWidth*current,
behavior:"smooth"
});

updatePage();

}

}

slider.addEventListener("scroll",()=>{

current=Math.round(slider.scrollLeft/slider.clientWidth);
updatePage();
showControls();

});

function fullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
}else{
document.exitFullscreen();
}

}

function showControls(){

controls.style.opacity="1";
controls.style.pointerEvents="auto";

clearTimeout(hideTimer);

hideTimer=setTimeout(()=>{

controls.style.opacity="0";
controls.style.pointerEvents="none";

},1200);

}

document.addEventListener("touchstart",showControls);
document.addEventListener("mousemove",showControls);

function checkOrientation(){

if(window.innerHeight>window.innerWidth){
document.getElementById("rotate").style.display="flex";
}else{
document.getElementById("rotate").style.display="none";
}

}

window.addEventListener("resize",checkOrientation);
window.addEventListener("load",checkOrientation);

updatePage();

</script>

</body>
</html>
