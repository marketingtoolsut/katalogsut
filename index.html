<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes">

<title>Katalog Produk</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
touch-action:manipulation;
}

.viewer{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.slider{
display:flex;
height:100%;
transition:transform .35s ease;
}

.slide{
flex:0 0 100%;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
max-width:100%;
max-height:100%;
object-fit:contain;
transition:transform .25s ease;
}

.controls{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

display:flex;
gap:12px;

background:rgba(0,0,0,.6);
padding:8px 14px;
border-radius:20px;

color:white;
font-size:14px;

opacity:0;
transition:opacity .3s;

}

button{
background:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

#rotate{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

#rotate img{
max-width:80%;
}

</style>
</head>

<body>

<div id="rotate">
<img src="rotatephone.png">
</div>

<div class="viewer">

<div class="slider" id="slider"></div>

</div>

<div class="controls" id="controls">

<button onclick="prev()">◀</button>

<span id="page">1 / 28</span>

<button onclick="next()">▶</button>

<button onclick="fullscreen()">⛶</button>

</div>


<script>

const total=28
const slider=document.getElementById("slider")
const page=document.getElementById("page")
const controls=document.getElementById("controls")

let current=0
let startX=0
let isDragging=false
let zoom=1
let lastTap=0

for(let i=1;i<=total;i++){

const div=document.createElement("div")
div.className="slide"

const img=document.createElement("img")
img.dataset.src=i+".jpg"
img.loading="lazy"

div.appendChild(img)

slider.appendChild(div)

}

const slides=document.querySelectorAll(".slide img")

function loadVisible(){

slides.forEach((img,i)=>{

if(Math.abs(i-current)<=1){

if(!img.src) img.src=img.dataset.src

}

})

}

function update(){

slider.style.transform="translateX(-"+(current*100)+"%)"

page.textContent=(current+1)+" / "+total

loadVisible()

}

function next(){

if(current<total-1){

current++

update()

}

}

function prev(){

if(current>0){

current--

update()

}

}

function fullscreen(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen()

}else{

document.exitFullscreen()

}

}

slider.addEventListener("touchstart",e=>{

startX=e.touches[0].clientX
isDragging=true

})

slider.addEventListener("touchend",e=>{

if(!isDragging)return

let diff=e.changedTouches[0].clientX-startX

if(Math.abs(diff)>60){

if(diff<0) next()
else prev()

}

isDragging=false

})

slider.addEventListener("touchstart",function(e){

let now=Date.now()

if(now-lastTap<300){

toggleZoom(e)

}

lastTap=now

})

function toggleZoom(e){

const img=slides[current]

if(zoom===1){

zoom=2
img.style.transform="scale(2)"

}else{

zoom=1
img.style.transform="scale(1)"

}

}

function showControls(){

controls.style.opacity=1

clearTimeout(window.hideUI)

window.hideUI=setTimeout(()=>{

controls.style.opacity=0

},1200)

}

document.addEventListener("touchstart",showControls)
document.addEventListener("mousemove",showControls)

function checkOrientation(){

if(window.innerHeight>window.innerWidth){

document.getElementById("rotate").style.display="flex"

}else{

document.getElementById("rotate").style.display="none"

}

}

window.addEventListener("resize",checkOrientation)
window.addEventListener("load",checkOrientation)

update()

</script>

</body>
</html>
